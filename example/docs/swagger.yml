basePath: /
definitions:
  godocker.Address:
    properties:
      Addr:
        description: 'endereço IP (ex: "172.17.0.2")'
        type: string
      PrefixLen:
        description: 'tamanho do prefixo CIDR (ex: 16 para /16)'
        type: integer
    type: object
  godocker.AddressPool:
    properties:
      Base:
        description: 'rede base em CIDR (ex: "10.0.0.0/8")'
        type: string
      Size:
        description: 'tamanho de cada subnet alocada (ex: 24 para /24)'
        type: integer
    type: object
  godocker.BlkioEntry:
    properties:
      major:
        description: 'número major do dispositivo (ex: 8 para /dev/sda)'
        type: integer
      minor:
        description: 'número minor do dispositivo (ex: 0 para /dev/sda)'
        type: integer
      op:
        description: 'operação: "Read", "Write", "Total", "Sync", "Async"'
        type: string
      value:
        description: valor da métrica (bytes ou contagem)
        type: integer
    type: object
  godocker.BlkioStats:
    properties:
      io_merged_recursive:
        description: operações mescladas
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_queue_recursive:
        description: operações na fila
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_service_bytes_recursive:
        description: bytes lidos/escritos
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_service_time_recursive:
        description: tempo de serviço
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_serviced_recursive:
        description: número de operações
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_time_recursive:
        description: tempo de uso do dispositivo
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      io_wait_time_recursive:
        description: tempo de espera
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
      sectors_recursive:
        description: setores acessados
        items:
          $ref: '#/definitions/godocker.BlkioEntry'
        type: array
    type: object
  godocker.CPUStats:
    properties:
      cpu_usage:
        allOf:
        - $ref: '#/definitions/godocker.CPUUsage'
        description: contadores de uso de CPU
      online_cpus:
        description: número de CPUs lógicas disponíveis
        type: integer
      system_cpu_usage:
        description: uso total do sistema (todos os processos)
        type: integer
      throttling_data:
        allOf:
        - $ref: '#/definitions/godocker.ThrottlingData'
        description: dados de throttling de CPU
    type: object
  godocker.CPUUsage:
    properties:
      percpu_usage:
        description: tempo por CPU lógica (ns)
        items:
          type: integer
        type: array
      total_usage:
        description: total de tempo de CPU usado (ns)
        type: integer
      usage_in_kernelmode:
        description: tempo no modo kernel (ns)
        type: integer
      usage_in_usermode:
        description: tempo no modo usuário (ns)
        type: integer
    type: object
  godocker.ClusterInfo:
    properties:
      CreatedAt:
        description: data de criação do cluster
        type: string
      DataPathPort:
        description: porta do plano de dados (VXLAN)
        type: integer
      DefaultAddrPool:
        description: pools de endereço padrão
        items:
          type: string
        type: array
      ID:
        description: ID do cluster
        type: string
      RootRotationInProgress:
        description: rotação de certificado raiz em progresso
        type: boolean
      Spec:
        allOf:
        - $ref: '#/definitions/godocker.SwarmSpec'
        description: especificação do cluster
      SubnetSize:
        description: tamanho da subnet por serviço
        type: integer
      UpdatedAt:
        description: data da última atualização
        type: string
      Version:
        allOf:
        - $ref: '#/definitions/godocker.ObjectVersion'
        description: versão do objeto Raft
    type: object
  godocker.Commit:
    properties:
      Expected:
        description: hash esperado (para verificação de integridade)
        type: string
      ID:
        description: hash do commit atual
        type: string
    type: object
  godocker.ConfigReference:
    properties:
      Network:
        description: nome da rede de configuração
        type: string
    type: object
  godocker.Container:
    properties:
      Command:
        description: comando em execução
        type: string
      Created:
        description: timestamp Unix de criação
        type: integer
      HostConfig:
        allOf:
        - $ref: '#/definitions/godocker.ContainerHostConfigSummary'
        description: resumo da configuração do host
      Id:
        description: ID completo do container (64 hex)
        type: string
      Image:
        description: 'imagem usada (ex: "nginx:latest")'
        type: string
      ImageID:
        description: ID da imagem (sha256:...)
        type: string
      Labels:
        additionalProperties:
          type: string
        description: labels personalizados
        type: object
      Mounts:
        description: volumes e bind mounts
        items:
          $ref: '#/definitions/godocker.MountPoint'
        type: array
      Names:
        description: 'nomes com "/" na frente (ex: ["/meu-app"])'
        items:
          type: string
        type: array
      NetworkSettings:
        allOf:
        - $ref: '#/definitions/godocker.ContainerNetworkSummary'
        description: resumo de redes conectadas
      Ports:
        description: mapeamentos de porta
        items:
          $ref: '#/definitions/godocker.Port'
        type: array
      SizeRootFs:
        description: tamanho total do filesystem (bytes)
        type: integer
      SizeRw:
        description: tamanho da camada gravável (bytes)
        type: integer
      State:
        description: '"running", "exited", "paused", etc.'
        type: string
      Status:
        description: 'texto legível (ex: "Up 2 hours")'
        type: string
    type: object
  godocker.ContainerConfig:
    properties:
      ArgsEscaped:
        description: args escapados (Windows)
        type: boolean
      AttachStderr:
        description: stderr conectado na criação
        type: boolean
      AttachStdin:
        description: stdin conectado na criação
        type: boolean
      AttachStdout:
        description: stdout conectado na criação
        type: boolean
      Cmd:
        description: comando padrão do container
        items:
          type: string
        type: array
      Domainname:
        description: domínio do container
        type: string
      Entrypoint:
        description: entrypoint do container
        items:
          type: string
        type: array
      Env:
        description: 'variáveis de ambiente (ex: ["PATH=/usr/bin"])'
        items:
          type: string
        type: array
      ExposedPorts:
        additionalProperties:
          type: object
        description: 'portas declaradas (ex: {"80/tcp":{}})'
        type: object
      Healthcheck:
        allOf:
        - $ref: '#/definitions/godocker.HealthcheckConfig'
        description: config do healthcheck
      Hostname:
        description: hostname do container
        type: string
      Image:
        description: nome da imagem base
        type: string
      Labels:
        additionalProperties:
          type: string
        description: labels do container
        type: object
      OnBuild:
        description: instruções ONBUILD da imagem
        items:
          type: string
        type: array
      OpenStdin:
        description: stdin mantido aberto
        type: boolean
      Shell:
        description: shell padrão para RUN, CMD, etc.
        items:
          type: string
        type: array
      StdinOnce:
        description: fecha stdin após o primeiro cliente desconectar
        type: boolean
      StopSignal:
        description: 'sinal de parada (padrão: SIGTERM)'
        type: string
      StopTimeout:
        description: segundos antes do SIGKILL
        type: integer
      Tty:
        description: pseudo-TTY alocado
        type: boolean
      User:
        description: 'usuário Unix (ex: "1000", "www-data")'
        type: string
      Volumes:
        additionalProperties:
          type: object
        description: 'volumes declarados (ex: {"/data":{}})'
        type: object
      WorkingDir:
        description: diretório de trabalho (WORKDIR)
        type: string
    type: object
  godocker.ContainerCreateOptions:
    properties:
      Cmd:
        description: 'comando a executar (ex: ["nginx", "-g", "daemon off;"])'
        items:
          type: string
        type: array
      Entrypoint:
        description: substitui o ENTRYPOINT da imagem
        items:
          type: string
        type: array
      Env:
        description: variáveis de ambiente no formato "KEY=valor"
        items:
          type: string
        type: array
      ExposedPorts:
        additionalProperties:
          type: object
        description: 'portas a expor (ex: {"80/tcp": {}})'
        type: object
      HostConfig:
        allOf:
        - $ref: '#/definitions/godocker.HostConfig'
        description: 'runtime: portas, volumes, restart, limites, etc.'
      Hostname:
        description: hostname do container
        type: string
      Image:
        description: 'imagem a usar — obrigatório (ex: "nginx:latest")'
        type: string
      Labels:
        additionalProperties:
          type: string
        description: 'labels para organização (ex: {"app": "web"})'
        type: object
      OpenStdin:
        description: mantém stdin aberto mesmo sem clientes conectados
        type: boolean
      StopSignal:
        description: 'sinal de parada (padrão: "SIGTERM")'
        type: string
      StopTimeout:
        description: segundos de espera antes do SIGKILL
        type: integer
      Tty:
        description: aloca pseudo-TTY (necessário para shells interativos)
        type: boolean
      User:
        description: 'usuário:grupo para o processo (ex: "1000:1000")'
        type: string
      Volumes:
        additionalProperties:
          type: object
        description: 'pontos de montagem declarados (ex: {"/data": {}})'
        type: object
      WorkingDir:
        description: diretório de trabalho dentro do container
        type: string
    type: object
  godocker.ContainerCreateResponse:
    properties:
      Id:
        description: ID gerado pelo Docker (64 caracteres hexadecimais)
        type: string
      Warnings:
        description: avisos não fatais emitidos pelo Docker (geralmente vazio)
        items:
          type: string
        type: array
    type: object
  godocker.ContainerHostConfigSummary:
    properties:
      NetworkMode:
        description: 'modo de rede: "bridge", "host", "none", etc.'
        type: string
    type: object
  godocker.ContainerInspect:
    properties:
      AppArmorProfile:
        description: perfil AppArmor aplicado
        type: string
      Args:
        description: argumentos passados ao executável
        items:
          type: string
        type: array
      Config:
        allOf:
        - $ref: '#/definitions/godocker.ContainerConfig'
        description: configuração da imagem/container
      Created:
        description: data de criação (RFC3339)
        type: string
      Driver:
        description: 'driver de storage (ex: "overlay2")'
        type: string
      ExecIDs:
        description: IDs de exec em andamento
        items:
          type: string
        type: array
      GraphDriver:
        allOf:
        - $ref: '#/definitions/godocker.GraphDriverData'
        description: dados do driver de armazenamento
      HostConfig:
        allOf:
        - $ref: '#/definitions/godocker.HostConfig'
        description: configuração completa de runtime
      HostnamePath:
        description: caminho do arquivo hostname no host
        type: string
      HostsPath:
        description: caminho do /etc/hosts no host
        type: string
      Id:
        description: ID completo (64 hex)
        type: string
      Image:
        description: ID da imagem (sha256:...)
        type: string
      LogPath:
        description: caminho do arquivo de log no host
        type: string
      MountLabel:
        description: label SELinux para mounts
        type: string
      Mounts:
        description: volumes e bind mounts ativos
        items:
          $ref: '#/definitions/godocker.MountPoint'
        type: array
      Name:
        description: 'nome com "/" (ex: "/meu-container")'
        type: string
      NetworkSettings:
        allOf:
        - $ref: '#/definitions/godocker.NetworkSettings'
        description: configuração completa de rede
      Path:
        description: executável do entrypoint
        type: string
      Platform:
        description: 'plataforma (ex: "linux")'
        type: string
      ProcessLabel:
        description: label SELinux para processos
        type: string
      ResolvConfPath:
        description: caminho do resolv.conf no host
        type: string
      RestartCount:
        description: quantas vezes foi reiniciado
        type: integer
      SizeRootFs:
        description: tamanho total do filesystem
        type: integer
      SizeRw:
        description: tamanho da camada gravável
        type: integer
      State:
        allOf:
        - $ref: '#/definitions/godocker.ContainerState'
        description: estado atual (running, exited, etc.)
    type: object
  godocker.ContainerNetworkSummary:
    properties:
      Networks:
        additionalProperties:
          $ref: '#/definitions/godocker.EndpointSettings'
        description: 'mapa: nome_da_rede → configuração'
        type: object
    type: object
  godocker.ContainerState:
    properties:
      Dead:
        description: true se está em estado morto (falha crítica)
        type: boolean
      Error:
        description: mensagem de erro se falhou
        type: string
      ExitCode:
        description: código de saída (0=sucesso, outro=erro)
        type: integer
      FinishedAt:
        description: data/hora de fim (RFC3339, zero se ainda rodando)
        type: string
      Health:
        allOf:
        - $ref: '#/definitions/godocker.Health'
        description: resultado do healthcheck (nil se não configurado)
      OOMKilled:
        description: true se foi morto por falta de memória
        type: boolean
      Paused:
        description: true se está pausado (docker pause)
        type: boolean
      Pid:
        description: PID do processo principal no host (0 se parado)
        type: integer
      Restarting:
        description: true se está no processo de restart
        type: boolean
      Running:
        description: true se está em execução agora
        type: boolean
      StartedAt:
        description: data/hora de início (RFC3339)
        type: string
      Status:
        description: '"created", "running", "paused", "restarting", "exited", "dead"'
        type: string
    type: object
  godocker.DeviceMapping:
    properties:
      CgroupPermissions:
        description: 'permissões: "r", "w", "m" ou combinações'
        type: string
      PathInContainer:
        description: onde aparece dentro do container
        type: string
      PathOnHost:
        description: caminho do dispositivo no host
        type: string
    type: object
  godocker.DeviceRequest:
    properties:
      Capabilities:
        description: 'capacidades requeridas (ex: [["gpu"]])'
        items:
          items:
            type: string
          type: array
        type: array
      Count:
        description: -1 = todos os dispositivos
        type: integer
      DeviceIDs:
        description: IDs específicos dos dispositivos
        items:
          type: string
        type: array
      Driver:
        description: 'driver do dispositivo (ex: "nvidia")'
        type: string
      Options:
        additionalProperties:
          type: string
        description: opções adicionais do driver
        type: object
    type: object
  godocker.DockerInfo:
    properties:
      Architecture:
        description: 'arquitetura: "x86_64", "aarch64", etc.'
        type: string
      BridgeNfIp6tables:
        description: bridge + ip6tables ativo
        type: boolean
      BridgeNfIptables:
        description: bridge + netfilter/iptables ativo
        type: boolean
      CPUSet:
        description: suporta cpuset (fixar em CPU específica)
        type: boolean
      CPUShares:
        description: suporta CPU shares (peso relativo)
        type: boolean
      CgroupDriver:
        description: 'driver de cgroup: "cgroupfs" ou "systemd"'
        type: string
      CgroupVersion:
        description: 'versão do cgroup: "1" ou "2"'
        type: string
      ContainerdCommit:
        allOf:
        - $ref: '#/definitions/godocker.Commit'
        description: ── Versões de componentes ────────────────────────────────────────────────
      Containers:
        description: ── Contadores ────────────────────────────────────────────────────────────
        type: integer
      ContainersPaused:
        description: containers pausados
        type: integer
      ContainersRunning:
        description: containers em execução
        type: integer
      ContainersStopped:
        description: containers parados
        type: integer
      CpuCfsPeriod:
        description: suporta CFS period (controle fino de CPU)
        type: boolean
      CpuCfsQuota:
        description: suporta CFS quota (limite de CPU)
        type: boolean
      Debug:
        description: ── Debug e goroutines ────────────────────────────────────────────────────
        type: boolean
      DefaultAddressPools:
        description: pools de IP padrão para novas redes
        items:
          $ref: '#/definitions/godocker.AddressPool'
        type: array
      DefaultRuntime:
        description: runtime padrão (normalmente "runc")
        type: string
      DockerRootDir:
        description: 'diretório raiz do Docker (ex: "/var/lib/docker")'
        type: string
      Driver:
        description: ── Storage ───────────────────────────────────────────────────────────────
        type: string
      DriverStatus:
        description: status detalhado do driver (pares chave-valor)
        items:
          items:
            type: string
          type: array
        type: array
      ExperimentalBuild:
        description: features experimentais ativas
        type: boolean
      HttpProxy:
        description: proxy HTTP configurado
        type: string
      HttpsProxy:
        description: proxy HTTPS configurado
        type: string
      ID:
        description: ── Identificação ─────────────────────────────────────────────────────────
        type: string
      IPv4Forwarding:
        description: encaminhamento IPv4 habilitado
        type: boolean
      Images:
        description: total de imagens locais
        type: integer
      IndexServerAddress:
        description: ── Rede e proxy ─────────────────────────────────────────────────────────
        type: string
      InitBinary:
        description: 'binário init (ex: "docker-init")'
        type: string
      InitCommit:
        allOf:
        - $ref: '#/definitions/godocker.Commit'
        description: versão do docker-init
      Isolation:
        description: 'isolamento (Windows: "hyperv", "process")'
        type: string
      KernelMemoryTCP:
        description: suporta limite de memória TCP do kernel
        type: boolean
      KernelVersion:
        description: versão do kernel Linux
        type: string
      Labels:
        description: ── Labels e configurações ────────────────────────────────────────────────
        items:
          type: string
        type: array
      LiveRestoreEnabled:
        description: containers sobrevivem ao restart do daemon
        type: boolean
      LoggingDriver:
        description: ── Logging ───────────────────────────────────────────────────────────────
        type: string
      MemTotal:
        description: memória total em bytes
        type: integer
      MemoryLimit:
        description: ── Capacidades do sistema (cgroup) ───────────────────────────────────────
        type: boolean
      NCPU:
        description: ── Sistema ───────────────────────────────────────────────────────────────
        type: integer
      NEventsListener:
        description: número de listeners de eventos
        type: integer
      NGoroutines:
        description: goroutines ativas no daemon
        type: integer
      Name:
        description: hostname da máquina
        type: string
      NoProxy:
        description: endereços que ignoram proxy
        type: string
      OSType:
        description: 'tipo: "linux" ou "windows"'
        type: string
      OSVersion:
        description: versão do OS
        type: string
      OomKillDisable:
        description: suporta desabilitar OOM killer
        type: boolean
      OomScoreAdj:
        description: ajuste OOM do daemon
        type: integer
      OperatingSystem:
        description: 'nome do OS (ex: "Ubuntu 22.04.3 LTS")'
        type: string
      PidsLimit:
        description: suporta limite de PIDs
        type: boolean
      Plugins:
        allOf:
        - $ref: '#/definitions/godocker.PluginsInfo'
        description: plugins disponíveis por categoria
      ProductLicense:
        description: 'licença (ex: "Community Engine")'
        type: string
      RuncCommit:
        allOf:
        - $ref: '#/definitions/godocker.Commit'
        description: versão do runc
      Runtimes:
        additionalProperties:
          $ref: '#/definitions/godocker.Runtime'
        description: runtimes disponíveis (runc, nvidia, etc.)
        type: object
      SecurityOptions:
        description: ── Segurança e plugins ───────────────────────────────────────────────────
        items:
          type: string
        type: array
      ServerVersion:
        description: 'versão do Docker (ex: "27.0.3")'
        type: string
      SwapLimit:
        description: suporta limite de swap
        type: boolean
      Swarm:
        allOf:
        - $ref: '#/definitions/godocker.SwarmInfo'
        description: ── Swarm ─────────────────────────────────────────────────────────────────
      Warnings:
        description: ── Avisos ────────────────────────────────────────────────────────────────
        items:
          type: string
        type: array
    type: object
  godocker.EndpointIPAMConfig:
    properties:
      IPv4Address:
        description: 'IP fixo (ex: "172.18.0.10")'
        type: string
      IPv6Address:
        description: IP IPv6 fixo
        type: string
    type: object
  godocker.EndpointSettings:
    properties:
      Aliases:
        description: nomes alternativos na rede
        items:
          type: string
        type: array
      DriverOpts:
        additionalProperties:
          type: string
        description: opções do driver de rede
        type: object
      EndpointID:
        description: ID do endpoint nesta rede
        type: string
      Gateway:
        description: gateway desta rede
        type: string
      GlobalIPv6Address:
        description: IP IPv6 global
        type: string
      GlobalIPv6PrefixLen:
        description: prefixo IPv6
        type: integer
      IPAMConfig:
        allOf:
        - $ref: '#/definitions/godocker.EndpointIPAMConfig'
        description: configuração de IP (nil = automático)
      IPAddress:
        description: IP do container nesta rede
        type: string
      IPPrefixLen:
        description: tamanho do prefixo CIDR
        type: integer
      IPv6Gateway:
        description: gateway IPv6
        type: string
      Links:
        description: links para outros containers
        items:
          type: string
        type: array
      MacAddress:
        description: endereço MAC nesta rede
        type: string
      NetworkID:
        description: ID da rede
        type: string
    type: object
  godocker.GraphDriverData:
    properties:
      Data:
        additionalProperties:
          type: string
        description: dados internos do driver (camadas, etc.)
        type: object
      Name:
        description: 'nome do driver (ex: "overlay2")'
        type: string
    type: object
  godocker.Health:
    properties:
      FailingStreak:
        description: quantas verificações consecutivas falharam
        type: integer
      Log:
        description: histórico das últimas verificações
        items:
          $ref: '#/definitions/godocker.HealthLog'
        type: array
      Status:
        description: '"healthy", "unhealthy", "starting", "none"'
        type: string
    type: object
  godocker.HealthLog:
    properties:
      End:
        description: fim da verificação (RFC3339)
        type: string
      ExitCode:
        description: 0=healthy, 1=unhealthy, 2=reserved
        type: integer
      Output:
        description: saída do comando de verificação
        type: string
      Start:
        description: início da verificação (RFC3339)
        type: string
    type: object
  godocker.HealthcheckConfig:
    properties:
      Interval:
        description: intervalo entre verificações (nanosegundos)
        type: integer
      Retries:
        description: falhas consecutivas antes de marcar unhealthy
        type: integer
      StartPeriod:
        description: período inicial de graça (nanosegundos)
        type: integer
      Test:
        description: 'comando: ["CMD", "curl", "-f", "http://localhost"]'
        items:
          type: string
        type: array
      Timeout:
        description: timeout de cada verificação (nanosegundos)
        type: integer
    type: object
  godocker.HostConfig:
    properties:
      Annotations:
        additionalProperties:
          type: string
        description: anotações arbitrárias
        type: object
      AutoRemove:
        description: remove container automaticamente ao parar
        type: boolean
      Binds:
        description: ── Montagens e arquivos ──────────────────────────────────────────────────
        items:
          type: string
        type: array
      BlkioDeviceReadBps:
        description: limite leitura (bytes/s)
        items:
          $ref: '#/definitions/godocker.ThrottleDevice'
        type: array
      BlkioDeviceReadIOps:
        description: limite leitura (ops/s)
        items:
          $ref: '#/definitions/godocker.ThrottleDevice'
        type: array
      BlkioDeviceWriteBps:
        description: limite escrita (bytes/s)
        items:
          $ref: '#/definitions/godocker.ThrottleDevice'
        type: array
      BlkioDeviceWriteIOps:
        description: limite escrita (ops/s)
        items:
          $ref: '#/definitions/godocker.ThrottleDevice'
        type: array
      BlkioWeight:
        description: I/O de bloco
        type: integer
      BlkioWeightDevice:
        description: peso por dispositivo
        items:
          $ref: '#/definitions/godocker.WeightDevice'
        type: array
      CapAdd:
        description: ── Segurança ─────────────────────────────────────────────────────────────
        items:
          type: string
        type: array
      CapDrop:
        description: capabilities Linux removidas
        items:
          type: string
        type: array
      Cgroup:
        description: cgroup pai customizado
        type: string
      CgroupParent:
        description: 'cgroup pai (ex: "/docker")'
        type: string
      CgroupnsMode:
        description: 'namespace de cgroup: "private" ou "host"'
        type: string
      ConsoleSize:
        description: tamanho do terminal [linhas, colunas]
        items:
          type: integer
        type: array
      ContainerIDFile:
        description: arquivo para salvar o ID do container
        type: string
      CpuCount:
        description: número de CPUs (Windows)
        type: integer
      CpuPercent:
        description: percentual de CPU (Windows)
        type: integer
      CpuPeriod:
        description: período do CFS scheduler (microssegundos)
        type: integer
      CpuQuota:
        description: quota de CPU no período (microssegundos)
        type: integer
      CpuRealtimePeriod:
        description: período de CPU realtime
        type: integer
      CpuRealtimeRuntime:
        description: runtime de CPU realtime
        type: integer
      CpuShares:
        description: |-
          ── Limites de recursos ───────────────────────────────────────────────────
          CPU
        type: integer
      CpusetCpus:
        description: 'CPUs permitidas (ex: "0-3", "0,2")'
        type: string
      CpusetMems:
        description: nós NUMA permitidos
        type: string
      DeviceCgroupRules:
        description: regras cgroup para dispositivos
        items:
          type: string
        type: array
      DeviceRequests:
        description: 'requisições CDI (ex: GPU)'
        items:
          $ref: '#/definitions/godocker.DeviceRequest'
        type: array
      Devices:
        description: Dispositivos
        items:
          $ref: '#/definitions/godocker.DeviceMapping'
        type: array
      Dns:
        description: servidores DNS customizados
        items:
          type: string
        type: array
      DnsOptions:
        description: opções do resolv.conf
        items:
          type: string
        type: array
      DnsSearch:
        description: domínios de busca DNS
        items:
          type: string
        type: array
      ExtraHosts:
        description: entradas /etc/hosts extras
        items:
          type: string
        type: array
      GroupAdd:
        description: grupos Unix adicionais para o processo
        items:
          type: string
        type: array
      IOMaximumBandwidth:
        description: máximo de banda I/O (Windows)
        type: integer
      IOMaximumIOps:
        description: máximo de IOPS (Windows)
        type: integer
      IpcMode:
        description: 'namespace IPC: "private", "host", "shareable"'
        type: string
      Isolation:
        description: isolamento (principalmente Windows)
        type: string
      Links:
        description: ── Comunicação ───────────────────────────────────────────────────────────
        items:
          type: string
        type: array
      LogConfig:
        allOf:
        - $ref: '#/definitions/godocker.LogConfig'
        description: ── Log ───────────────────────────────────────────────────────────────────
      MaskedPaths:
        description: caminhos ocultados dentro do container
        items:
          type: string
        type: array
      Memory:
        description: Memória
        type: integer
      MemoryReservation:
        description: reserva flexível de memória
        type: integer
      MemorySwap:
        description: memória + swap (-1 = sem limite)
        type: integer
      MemorySwappiness:
        description: tendência de swap (0-100, nil = padrão)
        type: integer
      NanoCpus:
        description: limite de CPU em nanoCPUs (1e9 = 1 CPU)
        type: integer
      NetworkMode:
        description: ── Rede ──────────────────────────────────────────────────────────────────
        type: string
      OomKillDisable:
        description: desativa o OOM killer (nil = padrão)
        type: boolean
      OomScoreAdj:
        description: ── Ajuste OOM ────────────────────────────────────────────────────────────
        type: integer
      PidMode:
        description: ── Namespaces ────────────────────────────────────────────────────────────
        type: string
      PidsLimit:
        description: PIDs e I/O máximo
        type: integer
      PortBindings:
        additionalProperties:
          items:
            $ref: '#/definitions/godocker.PortBinding'
          type: array
        description: mapeamento porta container → host
        type: object
      Privileged:
        description: acesso total ao host (perigoso)
        type: boolean
      PublishAllPorts:
        description: expõe todas as portas automaticamente
        type: boolean
      ReadonlyPaths:
        description: caminhos somente leitura dentro do container
        items:
          type: string
        type: array
      ReadonlyRootfs:
        description: filesystem raiz somente leitura
        type: boolean
      RestartPolicy:
        allOf:
        - $ref: '#/definitions/godocker.RestartPolicy'
        description: ── Restart ───────────────────────────────────────────────────────────────
      Runtime:
        description: 'runtime OCI (ex: "runc", "nvidia")'
        type: string
      SecurityOpt:
        description: opções de segurança (SELinux, AppArmor, seccomp)
        items:
          type: string
        type: array
      ShmSize:
        description: ── Memória compartilhada e IPC ───────────────────────────────────────────
        type: integer
      StorageOpt:
        additionalProperties:
          type: string
        description: ── Armazenamento ─────────────────────────────────────────────────────────
        type: object
      Sysctls:
        additionalProperties:
          type: string
        description: ── Sysctls e runtime ─────────────────────────────────────────────────────
        type: object
      Tmpfs:
        additionalProperties:
          type: string
        description: 'mountpoints tmpfs: {"/tmp": "size=100m"}'
        type: object
      UTSMode:
        description: 'namespace UTS: "" ou "host"'
        type: string
      Ulimits:
        description: limites do sistema (ulimit)
        items:
          $ref: '#/definitions/godocker.Ulimit'
        type: array
      UsernsMode:
        description: 'namespace de usuário: "" ou "host"'
        type: string
      VolumeDriver:
        description: driver de volume padrão
        type: string
      VolumesFrom:
        description: herda volumes de outros containers
        items:
          type: string
        type: array
    type: object
  godocker.IPAMConfig:
    properties:
      AuxiliaryAddresses:
        additionalProperties:
          type: string
        description: endereços reservados
        type: object
      Gateway:
        description: 'ex: "172.18.0.1"'
        type: string
      IPRange:
        description: 'range alocável (ex: "172.18.5.0/24")'
        type: string
      Subnet:
        description: 'ex: "172.18.0.0/16"'
        type: string
    type: object
  godocker.Image:
    properties:
      Created:
        description: RepoDigests []string          `json:"RepoDigests"`             //
          digests do registry
        type: integer
      Labels:
        additionalProperties:
          type: string
        description: |-
          SharedSize  int64             `json:"SharedSize"`              // tamanho compartilhado com outras imagens
          VirtualSize int64             `json:"VirtualSize,omitempty"`   // tamanho virtual total
        type: object
      RepoTags:
        description: ParentID    string            `json:"ParentId"`                //
          ID da imagem pai (vazio para base)
        items:
          type: string
        type: array
      Size:
        description: tamanho real em bytes
        type: integer
      id:
        description: ID da imagem (sha256:...)
        type: string
    type: object
  godocker.LogConfig:
    properties:
      Config:
        additionalProperties:
          type: string
        description: 'opções específicas do driver (ex: max-size, max-file)'
        type: object
      Type:
        description: 'driver: "json-file", "syslog", "none", etc.'
        type: string
    type: object
  godocker.MemoryStats:
    properties:
      failcnt:
        description: contagem de falhas de alocação
        type: integer
      limit:
        description: limite máximo de memória (bytes)
        type: integer
      max_usage:
        description: pico de uso de memória (bytes)
        type: integer
      stats:
        additionalProperties:
          format: int64
          type: integer
        description: métricas detalhadas do cgroup (cache, rss, etc.)
        type: object
      usage:
        description: uso atual de memória (bytes)
        type: integer
    type: object
  godocker.MountPoint:
    properties:
      Destination:
        description: caminho dentro do container
        type: string
      Driver:
        description: 'driver do volume (ex: "local")'
        type: string
      Mode:
        description: 'modo de montagem (ex: "ro", "rw", "z")'
        type: string
      Name:
        description: nome do volume (se Type="volume")
        type: string
      Propagation:
        description: 'propagação de bind: "rprivate", "shared", etc.'
        type: string
      RW:
        description: true = leitura+escrita, false = somente leitura
        type: boolean
      Source:
        description: caminho no host ou nome do volume
        type: string
      Type:
        description: '"bind", "volume" ou "tmpfs"'
        type: string
    type: object
  godocker.Network:
    properties:
      Attachable:
        description: true = containers podem se conectar manualmente
        type: boolean
      ConfigFrom:
        allOf:
        - $ref: '#/definitions/godocker.ConfigReference'
        description: referência de configuração (Swarm)
      ConfigOnly:
        description: true = apenas configuração, sem instância real
        type: boolean
      Containers:
        additionalProperties:
          $ref: '#/definitions/godocker.NetworkContainer'
        description: 'containers conectados: ID → info'
        type: object
      Created:
        description: data de criação (RFC3339)
        type: string
      Driver:
        description: '"bridge", "overlay", "host", "none", etc.'
        type: string
      EnableIPv6:
        description: true se IPv6 está habilitado
        type: boolean
      IPAM:
        allOf:
        - $ref: '#/definitions/godocker.NetworkIPAM'
        description: configuração de gerenciamento de IPs
      Id:
        description: ID único da rede
        type: string
      Ingress:
        description: true = rede de ingress do Swarm
        type: boolean
      Internal:
        description: true = sem acesso externo
        type: boolean
      Labels:
        additionalProperties:
          type: string
        description: labels da rede
        type: object
      Name:
        description: nome da rede
        type: string
      Options:
        additionalProperties:
          type: string
        description: opções do driver de rede
        type: object
      Scope:
        description: '"local" ou "swarm"'
        type: string
    type: object
  godocker.NetworkContainer:
    properties:
      EndpointID:
        description: ID do endpoint nesta rede
        type: string
      IPv4Address:
        description: 'IP do container com CIDR (ex: "172.18.0.2/16")'
        type: string
      IPv6Address:
        description: IP IPv6 do container (se configurado)
        type: string
      MacAddress:
        description: endereço MAC do container nesta rede
        type: string
      Name:
        description: nome do container
        type: string
    type: object
  godocker.NetworkIPAM:
    properties:
      Config:
        description: configurações de subnet (pode haver várias)
        items:
          $ref: '#/definitions/godocker.IPAMConfig'
        type: array
      Driver:
        description: 'driver IPAM: "default" ou customizado'
        type: string
      Options:
        additionalProperties:
          type: string
        description: opções do driver IPAM
        type: object
    type: object
  godocker.NetworkSettings:
    properties:
      Bridge:
        description: nome da bridge padrão
        type: string
      EndpointID:
        description: ID do endpoint na rede padrão
        type: string
      Gateway:
        description: gateway da rede padrão
        type: string
      GlobalIPv6Address:
        description: endereço IPv6 global
        type: string
      GlobalIPv6PrefixLen:
        description: prefixo do IPv6 global
        type: integer
      HairpinMode:
        description: modo hairpin (tráfego local)
        type: boolean
      IPAddress:
        description: IP do container na rede padrão
        type: string
      IPPrefixLen:
        description: tamanho do prefixo da rede
        type: integer
      IPv6Gateway:
        description: gateway IPv6
        type: string
      LinkLocalIPv6Address:
        description: endereço IPv6 link-local
        type: string
      LinkLocalIPv6PrefixLen:
        description: prefixo do IPv6 link-local
        type: integer
      MacAddress:
        description: endereço MAC do container
        type: string
      Networks:
        additionalProperties:
          $ref: '#/definitions/godocker.EndpointSettings'
        description: todas as redes conectadas
        type: object
      Ports:
        additionalProperties:
          items:
            $ref: '#/definitions/godocker.PortBinding'
          type: array
        description: portas mapeadas (porta/proto → binding)
        type: object
      SandboxID:
        description: ID do sandbox de rede
        type: string
      SandboxKey:
        description: caminho do namespace de rede
        type: string
      SecondaryIPAddresses:
        description: IPs IPv4 secundários
        items:
          $ref: '#/definitions/godocker.Address'
        type: array
      SecondaryIPv6Addresses:
        description: IPs IPv6 secundários
        items:
          $ref: '#/definitions/godocker.Address'
        type: array
    type: object
  godocker.NetworkStatsEntry:
    properties:
      rx_bytes:
        description: bytes recebidos
        type: integer
      rx_dropped:
        description: pacotes descartados na recepção
        type: integer
      rx_errors:
        description: erros de recepção
        type: integer
      rx_packets:
        description: pacotes recebidos
        type: integer
      tx_bytes:
        description: bytes transmitidos
        type: integer
      tx_dropped:
        description: pacotes descartados na transmissão
        type: integer
      tx_errors:
        description: erros de transmissão
        type: integer
      tx_packets:
        description: pacotes transmitidos
        type: integer
    type: object
  godocker.ObjectVersion:
    properties:
      Index:
        description: índice monotonicamente crescente do Raft
        type: integer
    type: object
  godocker.PeerNode:
    properties:
      Addr:
        description: endereço (host:porta)
        type: string
      NodeID:
        description: ID do nó
        type: string
    type: object
  godocker.PidsStats:
    properties:
      current:
        description: número atual de processos/threads
        type: integer
      limit:
        description: limite máximo configurado
        type: integer
    type: object
  godocker.PluginsInfo:
    properties:
      Authorization:
        description: plugins de autorização
        items:
          type: string
        type: array
      Log:
        description: 'plugins de log (ex: ["awslogs","json-file"])'
        items:
          type: string
        type: array
      Network:
        description: 'plugins de rede (ex: ["bridge","host","overlay"])'
        items:
          type: string
        type: array
      Volume:
        description: 'plugins de volume (ex: ["local"])'
        items:
          type: string
        type: array
    type: object
  godocker.Port:
    properties:
      IP:
        description: 'IP do host (ex: "0.0.0.0")'
        type: string
      PrivatePort:
        description: porta dentro do container
        type: integer
      PublicPort:
        description: porta exposta no host (0 se não exposta)
        type: integer
      Type:
        description: 'protocolo: "tcp" ou "udp"'
        type: string
    type: object
  godocker.PortBinding:
    properties:
      HostIp:
        description: 'IP do host onde a porta será vinculada (ex: "0.0.0.0")'
        type: string
      HostPort:
        description: 'porta do host como string (ex: "8080")'
        type: string
    type: object
  godocker.RestartPolicy:
    properties:
      MaximumRetryCount:
        description: 'apenas para "on-failure": máximo de tentativas'
        type: integer
      Name:
        description: '"no", "always", "on-failure", "unless-stopped"'
        type: string
    type: object
  godocker.Runtime:
    properties:
      path:
        description: caminho do binário do runtime
        type: string
      runtimeArgs:
        description: argumentos extras para o runtime
        items:
          type: string
        type: array
    type: object
  godocker.Stats:
    properties:
      blkio_stats:
        allOf:
        - $ref: '#/definitions/godocker.BlkioStats'
        description: métricas de I/O de disco
      cpu_stats:
        allOf:
        - $ref: '#/definitions/godocker.CPUStats'
        description: uso de CPU no momento atual
      id:
        description: ID do container
        type: string
      memory_stats:
        allOf:
        - $ref: '#/definitions/godocker.MemoryStats'
        description: uso de memória
      name:
        description: nome do container
        type: string
      networks:
        additionalProperties:
          $ref: '#/definitions/godocker.NetworkStatsEntry'
        description: métricas de rede por interface
        type: object
      num_procs:
        description: número de processos (Windows)
        type: integer
      pids_stats:
        allOf:
        - $ref: '#/definitions/godocker.PidsStats'
        description: contagem de processos/threads
      precpu_stats:
        allOf:
        - $ref: '#/definitions/godocker.CPUStats'
        description: uso de CPU no momento anterior
      preread:
        description: timestamp da leitura anterior
        type: string
      read:
        description: timestamp da leitura atual
        type: string
      storage_stats:
        allOf:
        - $ref: '#/definitions/godocker.StorageStats'
        description: métricas de armazenamento (Windows)
    type: object
  godocker.StorageStats:
    properties:
      read_count_normalized:
        description: contagem de leituras
        type: integer
      read_size_bytes:
        description: bytes lidos
        type: integer
      write_count_normalized:
        description: contagem de escritas
        type: integer
      write_size_bytes:
        description: bytes escritos
        type: integer
    type: object
  godocker.SwarmInfo:
    properties:
      Cluster:
        allOf:
        - $ref: '#/definitions/godocker.ClusterInfo'
        description: informações do cluster (nil se não manager)
      ControlAvailable:
        description: true se este nó é um manager
        type: boolean
      Error:
        description: mensagem de erro (se houver)
        type: string
      LocalNodeState:
        description: '"inactive", "pending", "active", "error", "locked"'
        type: string
      Managers:
        description: total de managers no cluster
        type: integer
      NodeAddr:
        description: endereço anunciado do nó
        type: string
      NodeID:
        description: ID do nó neste cluster (vazio se inativo)
        type: string
      Nodes:
        description: total de nós no cluster
        type: integer
      RemoteManagers:
        description: outros managers conhecidos
        items:
          $ref: '#/definitions/godocker.PeerNode'
        type: array
    type: object
  godocker.SwarmSpec:
    properties:
      Name:
        description: 'nome do cluster (ex: "default")'
        type: string
    type: object
  godocker.ThrottleDevice:
    properties:
      Path:
        description: 'caminho do dispositivo (ex: "/dev/sda")'
        type: string
      Rate:
        description: taxa em bytes/s ou operações/s dependendo do campo pai
        type: integer
    type: object
  godocker.ThrottlingData:
    properties:
      periods:
        description: total de períodos de enforcement
        type: integer
      throttled_periods:
        description: períodos onde houve throttling
        type: integer
      throttled_time:
        description: tempo total throttled (nanosegundos)
        type: integer
    type: object
  godocker.Ulimit:
    properties:
      Hard:
        description: limite rígido — não pode ser ultrapassado
        type: integer
      Name:
        description: 'nome do limite (ex: "nofile" para arquivos abertos)'
        type: string
      Soft:
        description: limite flexível — processo pode ultrapassar até o Hard
        type: integer
    type: object
  godocker.Volume:
    properties:
      CreatedAt:
        description: data de criação (RFC3339)
        type: string
      Driver:
        description: 'driver do volume (ex: "local")'
        type: string
      Labels:
        additionalProperties:
          type: string
        description: labels do volume
        type: object
      Mountpoint:
        description: caminho real no host
        type: string
      Name:
        description: nome do volume
        type: string
      Options:
        additionalProperties:
          type: string
        description: 'opções do driver (ex: type, device)'
        type: object
      Scope:
        description: '"local" ou "global" (swarm)'
        type: string
      Status:
        additionalProperties: {}
        description: status do driver (depende do driver)
        type: object
      UsageData:
        allOf:
        - $ref: '#/definitions/godocker.VolumeUsageData'
        description: dados de uso (nil se não disponível)
    type: object
  godocker.VolumeUsageData:
    properties:
      RefCount:
        description: número de containers usando este volume
        type: integer
      Size:
        description: tamanho total em bytes (-1 se desconhecido)
        type: integer
    type: object
  godocker.WeightDevice:
    properties:
      Path:
        description: 'caminho do dispositivo (ex: "/dev/sda")'
        type: string
      Weight:
        description: peso relativo de 10 a 1000
        type: integer
    type: object
  main.allData:
    properties:
      containers:
        items:
          $ref: '#/definitions/godocker.Container'
        type: array
      daemon:
        $ref: '#/definitions/godocker.DockerInfo'
      images:
        items:
          $ref: '#/definitions/godocker.Image'
        type: array
      networks:
        items:
          $ref: '#/definitions/godocker.Network'
        type: array
      volumes:
        items:
          $ref: '#/definitions/godocker.Volume'
        type: array
    type: object
  main.apiResp:
    properties:
      data: {}
      error:
        type: string
    type: object
  main.route:
    properties:
      description:
        type: string
      method:
        type: string
      params:
        type: string
      path:
        type: string
    type: object
  main.statusResp:
    properties:
      id:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
  description: API REST para gerenciar recursos Docker.
  title: godocker API
  version: "1.0"
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.route'
            type: array
      summary: Lista todas as rotas disponíveis
      tags:
      - Utilitários
  /all:
    get:
      description: daemon + containers + images + networks + volumes. Útil para dashboards.
      parameters:
      - description: 1 = inclui containers parados
        enum:
        - 0
        - 1
        in: query
        name: all
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.apiResp'
            - properties:
                data:
                  $ref: '#/definitions/main.allData'
              type: object
        "500":
          description: Docker inacessível
          schema:
            $ref: '#/definitions/main.apiResp'
      summary: Todos os recursos em uma requisição
      tags:
      - Utilitários
  /containers:
    get:
      description: Containers em execução. Use ?all=1 para incluir os parados.
      parameters:
      - description: 1 = inclui containers parados
        enum:
        - 0
        - 1
        in: query
        name: all
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.apiResp'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/godocker.Container'
                  type: array
              type: object
        "500":
          description: erro Docker
          schema:
            $ref: '#/definitions/main.apiResp'
      summary: Lista containers
      tags:
      - Containers
